{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
    <table>
        <tr>
            <td>symbol</td>
            <td>name</td>
            <td>shares</td>
            <td>price</td>
            <td>total_cost</td>
        </tr>
        <tr>
        {% for row in rows %}
            <td>{{row.stock_symbol}}</td>
            <td>{{row.stock_name}}</td>
            <td>{{row.shares}}</td>
            <td>{{row.price}}</td>
            <td>{{row.total_cost}}</td>
        </tr>
        {% endfor %}
    </table>
    <p><div><b>Cash in account: </b>{{current_cash}}</div></p>
{% endblock %}
