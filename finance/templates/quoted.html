{% extends "layout.html" %}

{% block title %}
    Stock quote details
{% endblock %}

{% block main %}
    {% if stock %}
        <div class="mb-3">
            <h1>Stock Quote for {{ stock["symbol"] }}:</h1>
            <div class="mb-3">{{ stock["name"] }}</div>
            <div class="mb-3">{{ stock["price"] }}</div>
        </div>
    {% else %}
    <p>No stock information found.</p>
    {% endif %}

{% endblock %}
