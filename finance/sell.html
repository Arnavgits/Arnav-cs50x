{% extends "layout.html" %}

{% block title %}
    Selling the stocks
{% endblock %}

{% block main %}
    <form action="/sell" method="post">
        <div class="mb-3">
            <select name="symbol" id="symbol" required>
                <option value="" disabled selected>Select a stock</option>
                {% for stock in stocks %}
                    <option value="{{ stock['symbol'] }}">{{ stock['symbol'] }} ({{ stock['total_shares'] }} shares)</option>
                {% endfor %}
            </select>
        </div>
        <button class="btn btn-primary" type="submit">confirm sell</button>
    </form>
{% endblock %}
