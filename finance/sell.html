{% extends "layout.html" %}

{% block title %}
    Selling the stocks
{% endblock %}

{% block main %}
    <form action="/sell" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="symbol" placeholder="Enter symbol" type="symbol">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="shares" placeholder="Input no of shares" type="number">
        </div>
        <button class="btn btn-primary" type="submit">confirm sell</button>
    </form>
{% endblock %}
